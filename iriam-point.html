<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IRIAMポイント管理</title>
  <meta name="theme-color" content="#0e0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ポイント管理" />
  <link rel="manifest" href="manifest-point.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:#0e0a1a; color:#e0d0ff; font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; }
    #app { max-width:430px; margin:0 auto; min-height:100vh; }
    input, textarea, select { font-family:inherit; }
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useMemo, useRef } = React;



// ============================================================
// STORAGE
// ============================================================
function loadData() {
  try { const r = localStorage.getItem("iriam_points_v2"); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveData(d) {
  try { localStorage.setItem("iriam_points_v2", JSON.stringify(d)); } catch {}
}
function loadApiKey() {
  try { return localStorage.getItem("iriam_apikey") || ""; } catch { return ""; }
}
function saveApiKey(k) {
  try { localStorage.setItem("iriam_apikey", k); } catch {}
}

// ============================================================
// HELPERS
// ============================================================
function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getYearMonth(s) { return s ? s.slice(0, 7) : ""; }
function fmtDateFull(s) {
  if (!s) return "—";
  const [y,m,d] = s.split("-");
  return `${y}/${parseInt(m)}/${parseInt(d)}`;
}
function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function calcMonthPt(history, ym) {
  return (history||[]).filter(h=>getYearMonth(h.date)===ym).reduce((s,h)=>s+h.pt,0);
}

// ============================================================
// 手動追加・pt記録モーダル
// ============================================================
function AddManualModal({ listeners, onSave, onClose }) {
  const [name,    setName]    = useState("");
  const [pt,      setPt]      = useState("");
  const [date,    setDate]    = useState(getTodayStr());
  const [memo,    setMemo]    = useState("");
  const [selId,   setSelId]   = useState("new"); // "new" or listener.id

  const save = () => {
    const ptNum = parseInt(pt);
    if (!name.trim() && selId === "new") return;
    if (isNaN(ptNum) || ptNum <= 0) return;
    onSave({ selId, name: name.trim(), pt: ptNum, date, memo: memo.trim() });
    onClose();
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
      <div style={{background:"#181030",borderTop:"2px solid #3a2060",borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",maxWidth:430,width:"100%",margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,background:"#3a2060",borderRadius:99,margin:"0 auto 18px"}} />
        <div style={{fontWeight:900,fontSize:"1rem",color:"#e0d0ff",marginBottom:18}}>ポイントを手動で記録</div>

        {/* リスナー選択 */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:"0.7rem",color:"#7060a0",fontWeight:700,marginBottom:6}}>リスナー</div>
          <select value={selId} onChange={e=>{ setSelId(e.target.value); if(e.target.value!=="new") setName(""); }}
            style={{width:"100%",background:"#1a1530",border:"1.5px solid #3a3060",borderRadius:8,padding:"10px 12px",color:"#e0d0ff",fontSize:"0.9rem",outline:"none",fontFamily:"inherit",marginBottom:8}}>
            <option value="new">＋ 新規リスナー</option>
            {listeners.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
          {selId === "new" && (
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="リスナー名を入力"
              style={{width:"100%",background:"#1a1530",border:"1.5px solid #3a3060",borderRadius:8,padding:"10px 12px",color:"#e0d0ff",fontSize:"0.9rem",outline:"none",fontFamily:"inherit"}} />
          )}
        </div>

        {/* pt */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:"0.7rem",color:"#7060a0",fontWeight:700,marginBottom:6}}>ポイント *</div>
          <input type="number" value={pt} onChange={e=>setPt(e.target.value)} placeholder="例: 1000"
            style={{width:"100%",background:"#1a1530",border:"1.5px solid #3a3060",borderRadius:8,padding:"10px 12px",color:"#e0d0ff",fontSize:"0.9rem",outline:"none",fontFamily:"inherit"}} />
        </div>

        {/* 日付 */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:"0.7rem",color:"#7060a0",fontWeight:700,marginBottom:6}}>日付</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{width:"100%",background:"#1a1530",border:"1.5px solid #3a3060",borderRadius:8,padding:"10px 12px",color:"#e0d0ff",fontSize:"0.9rem",outline:"none",fontFamily:"inherit"}} />
        </div>

        {/* メモ */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:"0.7rem",color:"#7060a0",fontWeight:700,marginBottom:6}}>メモ</div>
          <input value={memo} onChange={e=>setMemo(e.target.value)} placeholder="配信名など"
            style={{width:"100%",background:"#1a1530",border:"1.5px solid #3a3060",borderRadius:8,padding:"10px 12px",color:"#e0d0ff",fontSize:"0.9rem",outline:"none",fontFamily:"inherit"}} />
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:10,cursor:"pointer",background:"#1a1530",border:"1.5px solid #3a3060",color:"#7060a0",fontWeight:700,fontSize:"0.9rem"}}>キャンセル</button>
          <button onClick={save} style={{flex:2,padding:"12px",borderRadius:10,cursor:"pointer",background:"linear-gradient(135deg,#60b8f5,#a060d0)",border:"none",color:"#fff",fontWeight:700,fontSize:"0.9rem"}}>記録する</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// スクショ読み取りモーダル
// ============================================================
function ScreenshotModal({ listeners, onApply, onClose }) {
  const [apiKey,   setApiKey]   = useState(() => loadApiKey());
  const [preview,  setPreview]  = useState(null);
  const [base64,   setBase64]   = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [results,  setResults]  = useState(null);
  const [error,    setError]    = useState("");
  const [selected, setSelected] = useState({});
  const fileRef = useRef();

  const onFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setPreview(ev.target.result);
      setBase64(ev.target.result.split(",")[1]);
      setResults(null); setError("");
    };
    reader.readAsDataURL(file);
  };

  const analyze = async () => {
    if (!base64)        { setError("画像を選択してください"); return; }
    if (!apiKey.trim()) { setError("APIキーを入力してください"); return; }
    saveApiKey(apiKey.trim());
    setLoading(true); setError("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey.trim(), "anthropic-version": "2023-06-01" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: `IRIAMのギフトランキングのスクリーンショットです。全リスナーの名前とptを読み取ってください。JSONのみ返してください。形式: [{"name":"名前","pt":数値}]` },
          ]}]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      if (!data.content || !data.content.length) throw new Error("レスポンスが空です: " + JSON.stringify(data));
      const text = data.content.map(c=>c.type==="text"?c.text:"").join("").trim();
      if (!text) throw new Error("テキストが取得できませんでした");
      // JSON部分を抽出
      const jsonMatch = text.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error("JSON形式が見つかりません: " + text.slice(0,100));
      const parsed = JSON.parse(jsonMatch[0]);
      setResults(parsed);
      const sel = {};
      parsed.forEach(r => { sel[r.name] = true; });
      setSelected(sel);
    } catch(e) {
      setError("読み取りに失敗しました: " + e.message);
    } finally { setLoading(false); }
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#0e0a1aee",overflow:"auto"}}>
      <div style={{background:"#130e24",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
        <div style={{background:"linear-gradient(135deg,#2a1a3e,#1a0e2e)",borderBottom:"1.5px solid #3a2060",padding:"18px 20px 14px",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#a090c0",fontSize:"1.5rem",cursor:"pointer",lineHeight:1}}>‹</button>
            <div>
              <div style={{fontSize:"0.62rem",color:"#a060d0",fontWeight:700,letterSpacing:"0.2em"}}>AI読み取り</div>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:"#e0d0ff"}}>スクショから取り込む</div>
            </div>
          </div>
        </div>

        <div style={{padding:"16px 14px"}}>
          {/* APIキー */}
          <div style={{marginBottom:16,background:"#1e1640",border:"1.5px solid #3a2060",borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:"0.72rem",color:"#a060d0",fontWeight:700,marginBottom:8}}>🔑 Anthropic APIキー</div>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."
              style={{width:"100%",background:"#13102a",border:"1.5px solid #3a2060",borderRadius:8,padding:"10px 12px",color:"#e0d0ff",fontSize:"0.85rem",outline:"none",fontFamily:"inherit"}} />
            <div style={{fontSize:"0.65rem",color:"#5a4880",marginTop:6}}>この端末のみに保存されます</div>
          </div>

          {/* 画像選択 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:"0.72rem",color:"#a090c0",fontWeight:700,marginBottom:8}}>📷 スクショを選択</div>
            <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{display:"none"}} />
            <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"14px",borderRadius:12,cursor:"pointer",background:"#1e1640",border:"1.5px dashed #3a3060",color:"#7060a0",fontWeight:700,fontSize:"0.9rem"}}>
              {preview ? "画像を変更" : "タップして画像を選択"}
            </button>
            {preview && <img src={preview} alt="" style={{width:"100%",borderRadius:10,marginTop:10,maxHeight:240,objectFit:"contain",background:"#13102a"}} />}
          </div>

          <button onClick={analyze} disabled={loading||!base64}
            style={{width:"100%",padding:"14px",borderRadius:12,cursor:loading||!base64?"default":"pointer",background:loading||!base64?"#1a1530":"linear-gradient(135deg,#a060d0,#f5607c)",border:"none",color:loading||!base64?"#5a4880":"#fff",fontWeight:700,fontSize:"0.95rem",marginBottom:12}}>
            {loading ? "読み取り中..." : "AIで読み取る"}
          </button>

          {error && <div style={{color:"#f56070",fontSize:"0.78rem",marginBottom:12,background:"#2a1020",border:"1px solid #5a2030",borderRadius:8,padding:"8px 12px"}}>{error}</div>}

          {results && (
            <div style={{background:"#1e1640",border:"1px solid #3a3060",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontSize:"0.72rem",color:"#60b8f5",fontWeight:700,marginBottom:12}}>読み取り結果（チェックして取り込む）</div>
              {results.map(r => {
                const existing = listeners.find(l=>l.name===r.name);
                return (
                  <div key={r.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #2a2040"}}>
                    <input type="checkbox" checked={!!selected[r.name]} onChange={e=>setSelected(p=>({...p,[r.name]:e.target.checked}))}
                      style={{width:18,height:18,cursor:"pointer",accentColor:"#a060d0"}} />
                    <div style={{flex:1}}>
                      <div style={{fontSize:"0.88rem",fontWeight:700,color:"#e0d0ff"}}>{r.name}</div>
                      <div style={{fontSize:"0.72rem",color:"#7060a0"}}>
                        +{r.pt.toLocaleString()} pt
                        {!existing
                          ? <span style={{color:"#60b8f5",marginLeft:6,fontWeight:700}}>新規追加</span>
                          : <span style={{color:"#a090c0",marginLeft:6}}>累計 → {((existing.totalPt||0)+r.pt).toLocaleString()} pt</span>
                        }
                      </div>
                    </div>
                  </div>
                );
              })}
              <button onClick={()=>{ onApply(results.filter(r=>selected[r.name])); onClose(); }}
                style={{width:"100%",marginTop:14,padding:"12px",borderRadius:10,cursor:"pointer",background:"linear-gradient(135deg,#60b8f5,#a060d0)",border:"none",color:"#fff",fontWeight:700,fontSize:"0.9rem"}}>
                選択した内容を取り込む
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// リスナー詳細
// ============================================================
function ListenerDetail({ listener, onDelete, onClose }) {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth()+1).padStart(2,'0')}`;

  const byMonth = {};
  (listener.history||[]).forEach(h => {
    const ym = getYearMonth(h.date);
    if (!byMonth[ym]) byMonth[ym] = 0;
    byMonth[ym] += h.pt;
  });
  const months = Object.keys(byMonth).sort().reverse();

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#0e0a1a",overflow:"auto",maxWidth:430,margin:"0 auto"}}>
      <div style={{background:"linear-gradient(135deg,#2a1a3e,#1a0e2e)",borderBottom:"1.5px solid #3a2060",padding:"18px 20px 14px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#a090c0",fontSize:"1.5rem",cursor:"pointer",lineHeight:1}}>‹</button>
          <div>
            <div style={{fontSize:"0.62rem",color:"#a060d0",fontWeight:700,letterSpacing:"0.2em"}}>ポイント詳細</div>
            <div style={{fontSize:"1.1rem",fontWeight:900,color:"#e0d0ff"}}>{listener.name}</div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 14px 60px"}}>
        {/* 3つの統計 */}
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[
            { label:"先月",  value: calcMonthPt(listener.history, lastMonth) },
            { label:"今月",  value: calcMonthPt(listener.history, thisMonth) },
            { label:"累計",  value: listener.totalPt||0 },
          ].map(s=>(
            <div key={s.label} style={{flex:1,background:"#1e1640",border:"1px solid #3a3060",borderRadius:12,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:"#60b8f5"}}>{s.value.toLocaleString()}</div>
              <div style={{fontSize:"0.6rem",color:"#6050a0",marginTop:2}}>{s.label} pt</div>
            </div>
          ))}
        </div>

        {/* 月別履歴 */}
        <div style={{fontSize:"0.72rem",color:"#a090c0",fontWeight:700,marginBottom:10}}>月別ポイント</div>
        {months.length === 0 ? (
          <div style={{color:"#4a3870",textAlign:"center",padding:"20px 0",fontSize:"0.85rem"}}>履歴がありません</div>
        ) : months.map(ym => {
          const [y,m] = ym.split("-");
          const monthHistory = (listener.history||[]).filter(h=>getYearMonth(h.date)===ym).sort((a,b)=>b.date.localeCompare(a.date));
          return (
            <div key={ym} style={{marginBottom:12}}>
              <div style={{fontSize:"0.7rem",color:"#6050a0",fontWeight:700,marginBottom:6,paddingLeft:4}}>{y}年{parseInt(m)}月　合計 {byMonth[ym].toLocaleString()} pt</div>
              {monthHistory.map(h=>(
                <div key={h.id} style={{background:"#1e1640",border:"1px solid #3a3060",borderRadius:8,padding:"8px 12px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:"0.9rem",fontWeight:700,color:"#60b8f5"}}>+{h.pt.toLocaleString()} pt</span>
                    {h.memo && <span style={{fontSize:"0.72rem",color:"#7060a0",marginLeft:8}}>{h.memo}</span>}
                  </div>
                  <span style={{fontSize:"0.72rem",color:"#7060a0"}}>{fmtDateFull(h.date)}</span>
                </div>
              ))}
            </div>
          );
        })}

        {/* 削除 */}
        <button onClick={()=>{ onDelete(listener.id); onClose(); }}
          style={{width:"100%",padding:"12px",borderRadius:12,cursor:"pointer",background:"#1a1530",border:"1.5px solid #3a3060",color:"#5a4880",fontSize:"0.85rem",fontWeight:700,marginTop:8}}>
          このリスナーを削除
        </button>
      </div>
    </div>
  );
}

// ============================================================
// リスナーカード
// ============================================================
function ListenerCard({ listener, onTap }) {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth()+1).padStart(2,'0')}`;

  return (
    <button onClick={onTap} style={{width:"100%",background:"#1e1640",border:"1px solid #3a3060",borderRadius:14,padding:"12px 14px",marginBottom:8,cursor:"pointer",textAlign:"left"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:"0.95rem",fontWeight:700,color:"#e0d0ff",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{listener.name}</div>
          <div style={{fontSize:"0.78rem",fontWeight:700,color:"#60b8f5"}}>累計 {(listener.totalPt||0).toLocaleString()} pt</div>
        </div>
        <div style={{textAlign:"right",marginLeft:12,flexShrink:0,display:"flex",flexDirection:"column",gap:3}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:6}}>
            <span style={{fontSize:"0.6rem",color:"#5a4880"}}>先月</span>
            <span style={{fontSize:"0.8rem",fontWeight:700,color:"#a090c0"}}>{calcMonthPt(listener.history,lastMonth).toLocaleString()} pt</span>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:6}}>
            <span style={{fontSize:"0.6rem",color:"#5a4880"}}>今月</span>
            <span style={{fontSize:"0.8rem",fontWeight:700,color:"#a090c0"}}>{calcMonthPt(listener.history,thisMonth).toLocaleString()} pt</span>
          </div>
        </div>
      </div>
    </button>
  );
}

// ============================================================
// メインアプリ
// ============================================================
function App() {
  const [listeners,      setListenersRaw]   = useState(()=>loadData());
  const [showScreenshot, setShowScreenshot] = useState(false);
  const [showManual,     setShowManual]     = useState(false);
  const [detail,         setDetail]         = useState(null);
  const [search,         setSearch]         = useState("");

  const setListeners = (d) => { setListenersRaw(d); saveData(d); };

  const applyItems = (items, today) => {
    let updated = [...listeners];
    items.forEach(({ name, pt, date, memo }) => {
      const d = date || today;
      const idx = updated.findIndex(l=>l.name===name);
      if (idx >= 0) {
        updated[idx] = { ...updated[idx],
          totalPt: (updated[idx].totalPt||0) + pt,
          history: [...(updated[idx].history||[]), { id:newId(), pt, date:d, memo:memo||"" }],
        };
      } else {
        updated.push({ id:newId(), name, totalPt:pt, history:[{ id:newId(), pt, date:d, memo:memo||"" }] });
      }
    });
    updated.sort((a,b)=>(b.totalPt||0)-(a.totalPt||0));
    setListeners(updated);
  };

  const applyScreenshot = (items) => applyItems(items, getTodayStr());

  const applyManual = ({ selId, name, pt, date, memo }) => {
    const targetName = selId === "new" ? name : listeners.find(l=>l.id===selId)?.name || name;
    applyItems([{ name: targetName, pt, date, memo }], date);
  };

  const deleteListener = (id) => setListeners(listeners.filter(l=>l.id!==id));

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return q ? listeners.filter(l=>l.name.toLowerCase().includes(q)) : listeners;
  }, [listeners, search]);

  // ホーム統計
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth()+1).padStart(2,'0')}`;
  const allHistory = listeners.flatMap(l=>l.history||[]);
  const thisMonthPt = allHistory.filter(h=>getYearMonth(h.date)===thisMonth).reduce((s,h)=>s+h.pt,0);
  const lastMonthPt = allHistory.filter(h=>getYearMonth(h.date)===lastMonth).reduce((s,h)=>s+h.pt,0);
  const totalPt = listeners.reduce((s,l)=>s+(l.totalPt||0),0);

  return (
    <div style={{minHeight:"100vh",background:"#0e0a1a",color:"#e0d0ff",fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",maxWidth:430,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#2a1a3e,#1a0e2e)",borderBottom:"1.5px solid #3a2060",padding:"18px 20px 14px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:"0.62rem",color:"#a060d0",fontWeight:700,letterSpacing:"0.2em",marginBottom:2}}>IRIAM</div>
            <div style={{fontSize:"1.1rem",fontWeight:900,color:"#e0d0ff"}}>ポイント管理</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowManual(true)} style={{padding:"8px 12px",borderRadius:10,cursor:"pointer",background:"#1e1640",border:"1.5px solid #3a3060",color:"#a090c0",fontWeight:700,fontSize:"0.8rem"}}>
              ＋ 手動
            </button>
            <button onClick={()=>setShowScreenshot(true)} style={{padding:"8px 12px",borderRadius:10,cursor:"pointer",background:"linear-gradient(135deg,#a060d0,#f5607c)",border:"none",color:"#fff",fontWeight:700,fontSize:"0.8rem"}}>
              📷 読み取り
            </button>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 14px 40px"}}>
        {/* 統計 */}
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[
            { label:"先月の合計pt", value:lastMonthPt },
            { label:"今月の合計pt", value:thisMonthPt },
            { label:"累計pt",       value:totalPt },
          ].map(s=>(
            <div key={s.label} style={{flex:1,background:"#1e1640",border:"1px solid #3a3060",borderRadius:12,padding:"8px 4px",textAlign:"center"}}>
              <div style={{fontSize:"1rem",fontWeight:900,color:"#60b8f5"}}>{s.value.toLocaleString()}</div>
              <div style={{fontSize:"0.55rem",color:"#6050a0",marginTop:2,lineHeight:1.3}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* 検索 */}
        <div style={{marginBottom:14}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 リスナー名で検索"
            style={{width:"100%",background:"#1a1530",border:"1.5px solid #3a3060",borderRadius:10,padding:"10px 14px",color:"#e0d0ff",fontSize:"0.85rem",outline:"none",fontFamily:"inherit"}} />
        </div>

        {/* リスト */}
        {filtered.length === 0 ? (
          <div style={{color:"#4a3870",textAlign:"center",padding:"40px 0",fontSize:"0.9rem",lineHeight:2}}>
            📷 スクショ読み取り か<br/>＋ 手動 からポイントを記録しましょう
          </div>
        ) : filtered.map(l=>(
          <ListenerCard key={l.id} listener={l} onTap={()=>setDetail(l)} />
        ))}
      </div>

      {showManual     && <AddManualModal listeners={listeners} onSave={applyManual} onClose={()=>setShowManual(false)} />}
      {showScreenshot && <ScreenshotModal listeners={listeners} onApply={applyScreenshot} onClose={()=>setShowScreenshot(false)} />}
      {detail         && <ListenerDetail listener={detail} onDelete={deleteListener} onClose={()=>setDetail(null)} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
